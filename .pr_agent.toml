[config]
output_relevant_configurations = false
ai_timeout = 300
custom_model_max_tokens = 256000

[pr_description]
enable_semantic_files_types = false  # suppress the File Walkthrough section
enable_pr_type = false                 # suppress the "PR Type" section
enable_pr_diagram = false               # suppress the "Diagram Walkthrough" section

[pr_reviewer]
# Publish the review comment even when there are no findings/suggestions to report.
publish_output_no_suggestions = true
enable_auto_approval = true
maximal_review_effort = 1
extra_instructions = "If there are no security concerns, please write 'No security concerns. LGTM!' for the security_concerns field instead of just 'No'. If there are no major issues or findings, explicitly and prominently write 'LGTM' in any of the feedback fields."

[pr_code_suggestions]
num_code_suggestions_per_chunk = 5
suggestions_score_threshold = 6
publish_output_no_suggestions = false
commitable_code_suggestions = true
